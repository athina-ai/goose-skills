<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Carousel Slide 01 — Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #F4F3EE;
      --color-ink: #0A0A0A;
      --color-orange: #F26B3A;
      --color-pine: #0E3D2F;
      --color-pink: #F3A8DA;
      --color-lime: #D8EE57;
      --color-white: #FFFFFF;
      --color-white-muted: rgba(255,255,255,0.65);
      --tile-radius: 28px;
      --font: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1080px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--color-bg);
      font-family: var(--font);
      padding: 60px;
      display: flex; flex-direction: column;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .brand {
      font-family: var(--font);
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-ink);
    }
    .slide-meta {
      font-family: var(--font);
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(10,10,10,0.55);
    }

    .hero-tile {
      flex: 1;
      background: var(--color-ink);
      border-radius: var(--tile-radius);
      padding: 56px 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .eyebrow {
      font-family: var(--font);
      font-size: 13px; font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-lime);
    }

    .headline {
      font-family: var(--font);
      font-size: 88px; font-weight: 700;
      line-height: 0.98;
      letter-spacing: -2.5px;
      color: var(--color-white);
      max-width: 760px;
      margin-top: 32px;
    }
    .headline em {
      font-style: normal;
      color: var(--color-lime);
    }

    .sub {
      font-family: var(--font);
      font-size: 18px; font-weight: 400;
      line-height: 1.55;
      color: var(--color-white-muted);
      margin-top: 28px;
      max-width: 540px;
    }

    .bottom-meta {
      display: flex; align-items: flex-end;
      justify-content: space-between;
    }

    .swipe {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--color-orange);
      color: var(--color-white);
      font-family: var(--font);
      font-size: 13px; font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 14px 22px;
      border-radius: 999px;
    }

    .hero-num {
      font-family: var(--font);
      font-size: 320px; font-weight: 700;
      line-height: 0.85;
      letter-spacing: -10px;
      color: var(--color-lime);
    }
  </style>
</head>
<body>
  <div class="top-row">
    <span class="brand">goose.</span>
    <span class="slide-meta">01 / 06</span>
  </div>

  <div class="hero-tile">
    <div>
      <span class="eyebrow">The Playbook</span>
      <h1 class="headline">5 Tips for<br>Building a<br>Startup in <em>2026</em></h1>
      <p class="sub">A founder field guide for the AI-native era. Save it. Share it. Ship.</p>
    </div>

    <div class="bottom-meta">
      <span class="swipe">Swipe →</span>
      <span class="hero-num">5</span>
    </div>
  </div>
</body>
</html>
