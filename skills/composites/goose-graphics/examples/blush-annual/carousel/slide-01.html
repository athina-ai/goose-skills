<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Carousel Cover — Blush Annual</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #F4D0D5;
      --color-pink-deep: #E8B7BF;
      --color-sage: #C9D6B5;
      --color-mint: #B7D4C2;
      --color-cream: #EFE3D2;
      --color-ink: #1A1A1A;
      --color-ink-muted: rgba(26,26,26,0.65);
      --color-ink-quiet: rgba(26,26,26,0.45);
      --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      padding: 80px;
      position: relative;
    }

    .eyebrow {
      position: absolute;
      top: 80px;
      left: 80px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-ink);
      z-index: 3;
    }

    .brand {
      position: absolute;
      top: 80px;
      right: 80px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-ink);
      z-index: 3;
    }

    /* Sage tile sitting behind the 5 */
    .sage-tile {
      position: absolute;
      top: 200px;
      left: 120px;
      width: 720px;
      height: 660px;
      background: var(--color-sage);
      border-radius: 12px;
      z-index: 1;
    }

    /* Cream tile peeking under */
    .cream-tile {
      position: absolute;
      bottom: 200px;
      right: 80px;
      width: 280px;
      height: 200px;
      background: var(--color-cream);
      border-radius: 12px;
      z-index: 1;
    }

    /* Massive 5 numeral */
    .hero-numeral {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: var(--font-display);
      font-size: 880px;
      font-weight: 500;
      line-height: 0.85;
      letter-spacing: -36px;
      color: var(--color-ink);
      z-index: 2;
    }

    .title-block {
      position: absolute;
      bottom: 120px;
      left: 80px;
      right: 80px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .display-title {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--color-ink);
      max-width: 720px;
    }

    .footer-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 16px;
    }

    .footer-caption {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-ink-quiet);
    }
  </style>
</head>
<body>

  <p class="eyebrow">Annual Founder Letter &mdash; 2026</p>
  <p class="brand">goose.</p>

  <div class="sage-tile"></div>
  <div class="cream-tile"></div>
  <div class="hero-numeral">5</div>

  <div class="title-block">
    <h1 class="display-title">Tips for building a startup in 2026.</h1>
    <div class="footer-meta">
      <span class="footer-caption">Cover &middot; Vol. 01</span>
      <span class="footer-caption">Swipe to begin &rarr;</span>
    </div>
  </div>

</body>
</html>
