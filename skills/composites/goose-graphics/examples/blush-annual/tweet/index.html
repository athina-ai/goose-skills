<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Tweet — Blush Annual</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #F4D0D5;
      --color-pink-deep: #E8B7BF;
      --color-sage: #C9D6B5;
      --color-mint: #B7D4C2;
      --color-cream: #EFE3D2;
      --color-ink: #1A1A1A;
      --color-ink-muted: rgba(26,26,26,0.65);
      --color-ink-quiet: rgba(26,26,26,0.45);
      --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--color-bg);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-tile-sage {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 520px;
      height: 360px;
      background: var(--color-sage);
      border-radius: 12px;
      z-index: 0;
    }
    .bg-tile-cream {
      position: absolute;
      bottom: 60px;
      right: 60px;
      width: 480px;
      height: 320px;
      background: var(--color-cream);
      border-radius: 12px;
      z-index: 0;
    }
    .bg-tile-mint {
      position: absolute;
      top: 380px;
      right: 80px;
      width: 220px;
      height: 180px;
      background: var(--color-mint);
      border-radius: 12px;
      z-index: 0;
    }

    .bg-numeral {
      position: absolute;
      top: -120px;
      right: -60px;
      font-family: var(--font-display);
      font-size: 720px;
      font-weight: 500;
      line-height: 0.85;
      letter-spacing: -28px;
      color: rgba(26,26,26,0.06);
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    .top-eyebrow {
      position: absolute;
      top: 56px;
      left: 56px;
      z-index: 2;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-ink);
    }

    .brand-mark {
      position: absolute;
      top: 56px;
      right: 56px;
      z-index: 2;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-ink);
    }

    .card {
      position: relative;
      z-index: 3;
      width: 800px;
      background: var(--color-cream);
      border-radius: 16px;
      padding: 64px 64px 56px 64px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .quote-mark {
      font-family: var(--font-display);
      font-size: 180px;
      font-weight: 500;
      line-height: 0.6;
      letter-spacing: -6px;
      color: var(--color-ink);
      height: 80px;
    }

    .quote-body {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 400;
      line-height: 1.32;
      letter-spacing: -0.6px;
      color: var(--color-ink);
    }

    .quote-divider {
      width: 48px;
      height: 2px;
      background: var(--color-ink);
    }

    .quote-attribution {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .attribution-name {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-ink);
    }

    .attribution-date {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--color-ink-quiet);
    }
  </style>
</head>
<body>

  <div class="bg-tile-sage"></div>
  <div class="bg-tile-cream"></div>
  <div class="bg-tile-mint"></div>
  <div class="bg-numeral">5</div>

  <p class="top-eyebrow">Annual Founder Letter &middot; 2026</p>
  <p class="brand-mark">goose.</p>

  <div class="card">
    <div class="quote-mark">&ldquo;</div>
    <p class="quote-body">
      The founders who broke out in 2026 did five things differently. They shipped, embedded AI deeply, hired for leverage, listened obsessively, and charged real money.
    </p>
    <div class="quote-divider"></div>
    <div class="quote-attribution">
      <span class="attribution-name">&mdash; Alex Rivera, Founder &amp; Operator</span>
      <span class="attribution-date">April 22, 2026</span>
    </div>
  </div>

</body>
</html>
