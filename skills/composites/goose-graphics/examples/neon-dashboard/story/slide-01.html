<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>Story Slide 01 — Neon Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --color-stage: #F5F1EA;
    --color-purple: #1F0E2E;
    --color-neon-pink: #F18CFF;
    --color-neon-yellow: #F2E33A;
    --color-white-80: rgba(255,255,255,0.80);
    --color-white-45: rgba(255,255,255,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background: var(--color-stage);
    font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 56px;
    position: relative;
  }

  .card {
    width: 968px;
    height: 1808px;
    background: var(--color-purple);
    border-radius: 28px;
    padding: 72px 64px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1.2px, transparent 1.4px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .pill {
    position: relative;
    z-index: 1;
    align-self: flex-start;
    background: rgba(241,140,255,0.15);
    color: var(--color-neon-pink);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 999px;
  }

  .hero {
    position: relative;
    z-index: 1;
    font-size: 220px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -8px;
    color: var(--color-neon-pink);
    margin: 48px 0 32px 0;
  }

  .description {
    position: relative;
    z-index: 1;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.45;
    color: var(--color-white-80);
    max-width: 760px;
  }
  .description strong { color: #FFFFFF; font-weight: 700; }

  .chart-wrap {
    position: relative;
    z-index: 1;
    margin-top: auto;
    padding-top: 40px;
    border-top: 1px dashed rgba(255,255,255,0.18);
  }
  .chart-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--color-white-45);
    margin-bottom: 24px;
  }

  .bars {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    height: 480px;
  }

  .bar {
    flex: 1;
    background: rgba(241,140,255,0.35);
    border-radius: 8px 8px 0 0;
    position: relative;
  }
  .bar.b1 { height: 80px; background: rgba(241,140,255,0.30); }
  .bar.b2 { height: 130px; background: rgba(241,140,255,0.40); }
  .bar.b3 { height: 195px; background: rgba(241,140,255,0.50); }
  .bar.b4 { height: 260px; background: rgba(241,140,255,0.65); }
  .bar.b5 { height: 350px; background: var(--color-neon-pink); }
  .bar.b6 { height: 470px; background: var(--color-neon-yellow); }

  .bar-value {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 700;
    color: var(--color-neon-yellow);
    white-space: nowrap;
  }

  .axis-row {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-top: 14px;
  }
  .axis-label {
    flex: 1;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--color-white-45);
    text-transform: uppercase;
  }

  .footer {
    position: relative;
    z-index: 1;
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .footer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-neon-pink);
  }
  .footer-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--color-white-45);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="card-bg"></div>

    <span class="pill">API Calls</span>

    <div class="hero">+284%</div>

    <p class="description">
      API usage has seen a remarkable increase, surging to <strong>284%</strong> over the last month.
    </p>

    <div class="chart-wrap">
      <div class="chart-label">Monthly API calls &middot; last 6 months</div>
      <div class="bars">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
        <div class="bar b5"></div>
        <div class="bar b6"><span class="bar-value">+284%</span></div>
      </div>
      <div class="axis-row">
        <span class="axis-label">Nov</span>
        <span class="axis-label">Dec</span>
        <span class="axis-label">Jan</span>
        <span class="axis-label">Feb</span>
        <span class="axis-label">Mar</span>
        <span class="axis-label">Apr</span>
      </div>

      <div class="footer">
        <span class="footer-dot"></span>
        <span class="footer-text">See all insights &middot; goose.ai</span>
      </div>
    </div>
  </div>
</body>
</html>
