<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>Carousel Slide 01 — Neon Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --color-stage: #F5F1EA;
    --color-purple: #1F0E2E;
    --color-neon-pink: #F18CFF;
    --color-neon-yellow: #F2E33A;
    --color-white-80: rgba(255,255,255,0.80);
    --color-white-45: rgba(255,255,255,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background: var(--color-stage);
    font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    padding: 56px;
    position: relative;
  }

  .card {
    width: 968px;
    height: 968px;
    background: var(--color-purple);
    border-radius: 28px;
    padding: 56px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1.2px, transparent 1.4px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .pill {
    position: relative;
    z-index: 1;
    align-self: flex-start;
    background: rgba(241,140,255,0.15);
    color: var(--color-neon-pink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
  }

  .hero {
    position: relative;
    z-index: 1;
    font-size: 220px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -8px;
    color: var(--color-neon-pink);
    margin: 28px 0 18px 0;
  }

  .description {
    position: relative;
    z-index: 1;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--color-white-80);
    max-width: 620px;
  }

  .description strong {
    color: #FFFFFF;
    font-weight: 700;
  }

  /* Mini chart vignette */
  .vignette {
    position: relative;
    z-index: 1;
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    gap: 18px;
    height: 180px;
    padding-top: 20px;
    border-top: 1px dashed rgba(255,255,255,0.18);
  }

  .bar {
    width: 56px;
    border-radius: 6px 6px 0 0;
    background: rgba(241,140,255,0.35);
  }
  .bar.b1 { height: 40px; }
  .bar.b2 { height: 70px; background: rgba(241,140,255,0.45); }
  .bar.b3 { height: 95px; background: rgba(241,140,255,0.55); }
  .bar.b4 { height: 120px; background: rgba(241,140,255,0.70); }
  .bar.b5 { height: 150px; background: var(--color-neon-pink); }
  .bar.b6 { height: 170px; background: var(--color-neon-yellow); }

  .axis-row {
    display: flex;
    gap: 18px;
    margin-top: 10px;
  }
  .axis-label {
    width: 56px;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--color-white-45);
    text-transform: uppercase;
  }

  .vignette-wrap {
    position: relative;
    z-index: 1;
    margin-top: auto;
  }

  .footer {
    position: relative;
    z-index: 1;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .footer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-neon-pink);
  }
  .footer-text {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--color-white-45);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>

    <span class="pill">Startup Guide &middot; 2026</span>

    <div class="hero">+5 TIPS</div>

    <p class="description">
      Essential moves for <strong>building a startup</strong> that ships fast, scales smart, and outlasts the hype cycle in 2026.
    </p>

    <div class="vignette-wrap">
      <div class="vignette">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
        <div class="bar b5"></div>
        <div class="bar b6"></div>
      </div>
      <div class="axis-row">
        <span class="axis-label">T1</span>
        <span class="axis-label">T2</span>
        <span class="axis-label">T3</span>
        <span class="axis-label">T4</span>
        <span class="axis-label">T5</span>
        <span class="axis-label">2026</span>
      </div>
      <div class="footer">
        <span class="footer-dot"></span>
        <span class="footer-text">See all insights &middot; goose.ai</span>
      </div>
    </div>
  </div>
</body>
</html>
